<!DOCTYPE html>
<html>
  <head>
    <title>Flappy Bird</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" href="../NYAK_GAMES/images/NYAK GAMES.png" />

    <link
      href="https://fonts.googleapis.com/css?family=Pacifico"
      rel="stylesheet"
    />

  </head>
  <body>
    <!-- Back to Home Button -->
    <a href="../index.html" class="back-to-home-btn" title="Back to Home">
      <span class="btn-icon">⌂</span>
      <span class="btn-text">Home</span>
    </a>

    <div class="game-container">
      <div class="title-row">
        <div class="hud-item">
          <div class="hud-label">Score</div>
          <div class="hud-value" id="score-display">0</div>
        </div>
        
        <h1 class="game-title">FLAPPY BIRD</h1>
        
        <div class="hud-item">
          <div class="hud-label">Best</div>
          <div class="hud-value" id="best-display">0</div>
        </div>
      </div>
      
      <div class="flash-overlay" id="flash-overlay"></div>
      <button class="replay-btn" id="replay-btn">Play Again ↻</button>
      
      <canvas
        id="myCanvas"
        width="620"
        height="480"
        style="
          background: url('images/flappyback.png');
          background-size: 100%;
        "
      ></canvas>
      
      <p class="instructions">
        Press <span>SPACE</span>, <span>CLICK</span>, or <span>TAP</span> to jump!
      </p>
    </div>
    <script src="script.js"></script>
  </body>
</html>
