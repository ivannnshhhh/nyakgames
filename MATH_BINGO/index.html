<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="../NYAK_GAMES/images/NYAK GAMES.png" />
    <title>Bingo Randomizer</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <!-- <div id="header">
        <img src="assets/images/mathclub.jpg" alt="Math Club Logo" class="header-logo math-logo">
        <img src="assets/images/byte.png" alt="Byte Logo" class="header-logo">
    </div> -->
    <h1 id="title">Math Bingo</h1>
    <p id="instructions">Click the bottle to draw a bingo expression!</p>
    <div id="shaker"></div>
    <!-- Back to Home Button -->
    <a href="../index.html" class="back-to-home-btn" title="Back to Home">
      <span class="btn-icon">⌂</span>
      <span class="btn-text">Home</span>
    </a>
    <button id="reset-btn">Reset Game</button>
    <select id="round-select">
        <option value="1">Round 1</option>
        <option value="2">Round 2</option>
        <option value="3">Round 3</option>
        <option value="4">Round 4</option>
        <option value="5">Round 5</option>
    </select>
    <button id="toggle-panel">▶</button>
    <div id="side-panel" class="hidden">
        <div id="drawn-balls"></div>
    </div>
    <div id="popup" class="hidden">
        <div id="bingo-ball">
            <div id="letter"></div>
            <div id="equation"></div>
        </div>
        <button id="close-btn">Close</button>
    </div>
    <script src="assets/js/script.js"></script>
</body>
</html>
