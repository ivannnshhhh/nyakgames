<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Snake Game</title>
    <link rel="icon" href="../NYAK_GAMES/images/NYAK GAMES.png" />
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.3.0/css/all.min.css">
    <script src="script.js" defer></script>
  </head>
  <body>
    <!-- Back to Home Button -->
    <a href="../index.html" class="back-to-home-btn" title="Back to Home">
      <span class="btn-icon">⌂</span>
      <span class="btn-text">Home</span>
    </a>

    <div class="wrapper">
      <div class="game-details">
        <span class="score">Score: 0</span>
        <span class="high-score">High Score: 0</span>
        <button class="pause-btn" title="Pause (P)">
          <i class="fa-solid fa-pause"></i>
        </button>
      </div>
      <div class="play-board"></div>
      
      <!-- Start Screen Overlay -->
      <div class="overlay start-screen">
        <div class="overlay-content">
          <div class="game-title">
            <span class="title-snake">SNAKE</span>
            <span class="title-game">GAME</span>
          </div>
          <div class="snake-icon">
            <div class="snake-segment"></div>
            <div class="snake-segment"></div>
            <div class="snake-segment"></div>
            <div class="snake-segment"></div>
            <div class="snake-head"></div>
          </div>
          <p class="instructions">Use Arrow Keys to Move</p>
          <button class="start-btn">Start Game</button>
          <div class="keyboard-hints">
            <span><i class="fa-solid fa-arrow-up"></i></span>
            <span><i class="fa-solid fa-arrow-left"></i></span>
            <span><i class="fa-solid fa-arrow-down"></i></span>
            <span><i class="fa-solid fa-arrow-right"></i></span>
          </div>
        </div>
      </div>
      
      <!-- Game Over Overlay -->
      <div class="overlay game-over-screen hidden">
        <div class="overlay-content">
          <div class="game-over-icon">
            <i class="fa-solid fa-skull-crossbones"></i>
          </div>
          <h2>Game Over!</h2>
          <div class="final-score">
            <p>Score: <span class="final-score-value">0</span></p>
            <p>Best: <span class="best-score-value">0</span></p>
          </div>
          <button class="restart-btn">Play Again</button>
        </div>
      </div>
      
      <!-- Pause Overlay -->
      <div class="overlay pause-screen hidden">
        <div class="overlay-content">
          <div class="pause-icon">
            <i class="fa-solid fa-pause"></i>
          </div>
          <h2>Paused</h2>
          <button class="resume-btn">Resume</button>
          <button class="restart-from-pause-btn">Restart</button>
        </div>
      </div>
      
      <div class="controls">
        <button class="control-btn" data-key="ArrowLeft" aria-label="Move Left">
          <i class="fa-solid fa-arrow-left-long"></i>
        </button>
        <button class="control-btn" data-key="ArrowUp" aria-label="Move Up">
          <i class="fa-solid fa-arrow-up-long"></i>
        </button>
        <button class="control-btn" data-key="ArrowRight" aria-label="Move Right">
          <i class="fa-solid fa-arrow-right-long"></i>
        </button>
        <button class="control-btn" data-key="ArrowDown" aria-label="Move Down">
          <i class="fa-solid fa-arrow-down-long"></i>
        </button>
      </div>
    </div>

  
</body></html>
